<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW CORRIDOR | First Person Horror</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Game Container -->
    <div id="game-wrapper">
        <!-- Game Canvas (for future WebGL rendering) -->
        <canvas id="game-canvas"></canvas>
        
        <!-- Game UI Overlay -->
        <div id="game-ui">
            <!-- HUD Elements -->
            <div id="hud">
                <div class="hud-item" id="health-container">
                    <span class="hud-icon">❤️</span>
                    <div class="hud-bar">
                        <div id="health-fill" class="fill-bar" style="width: 100%"></div>
                    </div>
                    <span id="health-value">100</span>
                </div>
                
                <div class="hud-item" id="sanity-container">
                    <span class="hud-icon">🧠</span>
                    <div class="hud-bar">
                        <div id="sanity-fill" class="fill-bar" style="width: 100%"></div>
                    </div>
                    <span id="sanity-value">100</span>
                </div>
                
                <div class="hud-item" id="flashlight-container">
                    <span class="hud-icon">🔦</span>
                    <div class="hud-bar">
                        <div id="flashlight-fill" class="fill-bar" style="width: 100%"></div>
                    </div>
                    <span id="flashlight-value">100%</span>
                </div>
            </div>
            
            <!-- Crosshair -->
            <div id="crosshair">
                <div class="crosshair-part crosshair-top"></div>
                <div class="crosshair-part crosshair-right"></div>
                <div class="crosshair-part crosshair-bottom"></div>
                <div class="crosshair-part crosshair-left"></div>
                <div class="crosshair-center"></div>
            </div>
            
            <!-- Interaction Prompt -->
            <div id="interaction-prompt" class="hidden">
                <span id="interaction-key">[E]</span>
                <span id="interaction-text"></span>
            </div>
            
            <!-- Inventory -->
            <div id="inventory">
                <div class="inventory-slot" id="slot-1"></div>
                <div class="inventory-slot" id="slot-2"></div>
                <div class="inventory-slot" id="slot-3"></div>
                <div class="inventory-slot" id="slot-4"></div>
            </div>
            
            <!-- Objective Tracker -->
            <div id="objective-tracker">
                <h3>Current Objective</h3>
                <p id="current-objective">Find a way out</p>
            </div>
        </div>
        
        <!-- Menus -->
        <div id="main-menu" class="menu active">
            <h1 class="game-title">SHADOW CORRIDOR</h1>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="Game.startNewGame()">New Game</button>
                <button class="menu-btn" onclick="Game.showOptions()">Options</button>
                <button class="menu-btn" onclick="Game.showCredits()">Credits</button>
            </div>
        </div>
        
        <div id="pause-menu" class="menu hidden">
            <h2>PAUSED</h2>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="Game.resume()">Resume</button>
                <button class="menu-btn" onclick="Game.showOptions()">Options</button>
                <button class="menu-btn" onclick="Game.quitToMenu()">Quit to Menu</button>
            </div>
        </div>
        
        <div id="game-over-menu" class="menu hidden">
            <h2 class="game-over-title">GAME OVER</h2>
            <p id="death-message">You have succumbed to the darkness...</p>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="Game.restartFromCheckpoint()">Restart</button>
                <button class="menu-btn" onclick="Game.quitToMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
